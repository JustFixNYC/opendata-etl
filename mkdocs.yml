# SPDX-License-Identifier: AGPL-3.0-only
site_name: opendata-etl
site_description: Framework docs with aggregated definition-repository pages and generated reference stubs.
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.expand
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

# Navigation lives in docs/.nav.yml (mkdocs-awesome-nav v3 ignores `nav` here).
plugins:
  - search
  - awesome-nav

extra:
  generator: false

strict: true
