api_version: opendata-etl.definitions/v1
profile: standard
notes: |
  Generic production-shaped fixture manifest. It demonstrates one public schema,
  one protected schema, and an explicit cross-schema read grant without using
  operator-specific repositories, credentials, or paths.
source_credentials:
  fake_source_reader:
    kind: aws_iam
    description: Example instance-profile credential for examples/definition-repo s3_fixture.
definitions:
  - name: example_collection
    url: "https://github.com/example-org/example-definition-repo.git"
    ref: "v0.1.0"
    schema: ex_housing
    protected: false
    depends_on: []
    enabled_datasets:
      - sample_csv
      - bundle_demo
      - s3_fixture
      - building_rollups
  - name: protected_reports
    url: "https://github.com/example-org/protected-reports-definition-repo.git"
    ref: "v0.1.0"
    schema: ex_reports
    protected: true
    depends_on:
      - example_collection
    cross_repo_grants:
      - schema: ex_housing
        access: read
    enabled_datasets:
      - bundle_demo
