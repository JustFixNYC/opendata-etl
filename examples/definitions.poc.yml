api_version: opendata-etl.definitions/v1
profile: standard
notes: |
  Generic standard-profile fixture manifest for docs and CI. Real operators keep
  org-specific POC manifests in their deployment repo.
  Runtime defaults:
    OPENDATA_LANDING_BACKEND=s3
    OPENDATA_LOAD_BACKEND=s3_copy_rds
    OPENDATA_DERIVED_RUNNER=docker
    OPENDATA_EXTRACT_EXECUTOR=local
    OPENDATA_DAGSTER_MATERIALIZE=full
  See docs/deployment/aws-first-deploy.md.
source_credentials:
  fake_source_reader:
    kind: aws_iam
    description: Example instance-profile credential for examples/definition-repo s3_fixture.
definitions:
  - name: example_collection
    url: "https://github.com/example-org/example-definition-repo.git"
    ref: "v0.1.0"
    schema: ex_housing
    protected: false
    depends_on: []
    enabled_datasets:
      - sample_csv
      - bundle_demo
      - s3_fixture
