name: bundle_demo
description: Two-table bundle demonstrating foreign_keys between sibling tables.
schedule: "0 6 * * 1"
freshness_sla_hours: 168
schema_contract: freeze
tables:
  - name: buildings
    source:
      type: csv
      url: "https://example.invalid/opendata-etl-fixtures/buildings.csv"
    columns:
      - name: building_id
        type: bigint
      - name: name
        type: text
    indexes:
      - [building_id]
  - name: units
    source:
      type: csv
      url: "https://example.invalid/opendata-etl-fixtures/units.csv"
    columns:
      - name: unit_id
        type: bigint
      - name: building_id
        type: bigint
    indexes:
      - [unit_id]
      - [building_id]
    foreign_keys:
      - columns: [building_id]
        references:
          table: buildings
          columns: [building_id]
