path: /buildings/by-id
method: GET
description: Fixture endpoint selecting from the bundle_demo dataset tables.
statement_timeout_seconds: 30
rate_limit:
  anonymous: "60/minute"
  api_key: "600/minute"
params:
  - name: building_id
    type: integer
    required: true
    min: 1
    max: 999999999
    description: Synthetic building identifier from the fixture dataset.
output:
  format: json
sql: |
  SELECT b.building_id, b.name
  FROM bundle_demo__buildings b
  WHERE b.building_id = :building_id
  LIMIT 1
