# Local stack: PostGIS, MinIO, Dagster (shell), FastAPI (shell).
# Validate without pulling images: docker compose config
# Bring up: docker compose up --build -d

name: opendata-etl

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opendata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opendata}
      POSTGRES_DB: ${POSTGRES_DB:-opendata}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-opendata} -d ${POSTGRES_DB:-opendata}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dagster:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${OPENDATA_IMAGE_NAME:-opendata-etl:local}
    command:
      [
        "dagster",
        "dev",
        "-h",
        "0.0.0.0",
        "-p",
        "3000",
        "-m",
        "pipeline.dagster_defs",
        "--working-directory",
        "/workspace",
      ]
    working_dir: /workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://opendata:opendata@postgres:5432/opendata}
      OPENDATA_DEFINITIONS_MANIFEST_PATH: ${OPENDATA_DEFINITIONS_MANIFEST_PATH:-/workspace/examples/definitions.local.yml}
      OPENDATA_DEFINITIONS_WORK_DIR: ${OPENDATA_DEFINITIONS_WORK_DIR:-/workspace/data/definitions_work}
      OPENDATA_DAGSTER_DEFINITION_LOAD: ${OPENDATA_DAGSTER_DEFINITION_LOAD:-auto}
      DEFINITIONS_REFRESH_ON_START: ${DEFINITIONS_REFRESH_ON_START:-false}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-opendata-landing}
    ports:
      - "${DAGSTER_PORT:-3000}:3000"
    volumes:
      - definitions_work:/workspace/data/definitions_work
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${OPENDATA_IMAGE_NAME:-opendata-etl:local}
    command:
      ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    working_dir: /workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://opendata:opendata@postgres:5432/opendata}
      OPENDATA_DEFINITIONS_MANIFEST_PATH: ${OPENDATA_DEFINITIONS_MANIFEST_PATH:-/workspace/examples/definitions.local.yml}
      OPENDATA_DEFINITIONS_WORK_DIR: ${OPENDATA_DEFINITIONS_WORK_DIR:-/workspace/data/definitions_work}
      DEFINITIONS_REFRESH_ON_START: ${DEFINITIONS_REFRESH_ON_START:-false}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-opendata-landing}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - definitions_work:/workspace/data/definitions_work
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  minio_data:
  definitions_work:
