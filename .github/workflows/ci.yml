name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      OPENDATA_LOADER_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      DBT_PROFILES_DIR: ${{ github.workspace }}/examples/definition-repo/models/dbt_profile
      DBT_TARGET_SCHEMA: ex_housing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile placeholder packages
        run: python3 -m compileall pipeline api scripts tests
      - name: Parse pyproject.toml
        run: python3 -c "import tomllib, pathlib; tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))"
      - name: Install definition validation dependencies
        run: python3 -m pip install 'PyYAML>=6.0.1' 'jsonschema>=4.21.0' 'pytest>=8.0.0' 'psycopg[binary]>=3.1.18' 'dagster==1.13.4' 'dagster-dbt==0.29.4' 'dbt-core>=1.8,<1.12' 'dbt-postgres>=1.8,<1.12' 'boto3>=1.34.0' 'requests>=2.31.0' 'moto[s3]>=5.0.0'
      - name: dbt parse (example definition repo)
        run: dbt parse --project-dir examples/definition-repo/models --target dev
      - name: Run unit tests
        run: python3 -m pytest -q
      - name: Run example fixture validation
        run: python3 scripts/validate_definitions.py --examples-default
      - name: Cross-check named credentials for example_collection
        run: python3 scripts/validate_definitions.py --repo examples/definition-repo --deployment examples/definitions.local.yml --check-credentials
      - name: Validate Docker Compose file (no image pull)
        run: docker compose config -q
